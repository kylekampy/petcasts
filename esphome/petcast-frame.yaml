# Petcast ESPHome config for Seeed reTerminal E1002
#
# Boot-driven flow:
#   1. Wake from deep sleep (timer or green button)
#   2. Wait for HA time sync
#   3. POST /api/generate (server skips if already done today → 429)
#   4. If 202: wait 2 min for generation, then fetch image
#   5. If 429: fetch image immediately (already fresh)
#   6. Display image, deep sleep until 5:00 AM
#
# Buttons:
#   Green: wake from deep sleep (triggers normal boot flow)
#   Right white: force regeneration (bypasses "already today" check)
#   Left white: re-fetch and redraw, then sleep

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    priority: -100
    then:
      - light.turn_on: onboard_led
      - lambda: 'id(boot_count) += 1;'
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "booted"
      - component.update: wake_reason_sensor
      - component.update: boot_count_sensor
      - logger.log: "Device booted"
      - script.execute: update_battery_status
      - script.execute: sleep_watchdog
      # Wait for WiFi before anything network-dependent
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "waiting_for_wifi"
      - logger.log: "Waiting for WiFi..."
      - wait_until:
          condition:
            - wifi.connected:
          timeout: 30s
      # Wait for HA time sync
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "waiting_for_time"
      - logger.log: "Waiting for HA time sync..."
      - wait_until:
          condition:
            - time.has_time:
                id: ha_time
          timeout: 60s
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "time_synced"
      - logger.log:
          format: "Time synced: %02d:%02d"
          args: ["id(ha_time).now().hour", "id(ha_time).now().minute"]
      # Trigger generation (server returns 429 if already done today)
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "triggering_generation"
      - script.execute: trigger_and_display
      - text_sensor.template.publish:
          id: last_boot_step_sensor
          state: "complete"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: 'WiFi connected'
  ap:
    ssid: 'Petcast-Frame Fallback'
    password: !secret ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
    timezone: 'America/Chicago'

globals:
  - id: generation_accepted
    type: bool
    restore_value: false
    initial_value: "false"
  - id: boot_count
    type: int
    restore_value: true
    initial_value: "0"

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      it.image(0, 0, id(frame_image));

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: frame_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - text_sensor.template.publish:
          id: last_image_download_sensor
          state: "downloaded"
      - logger.log: "Image downloaded, updating display"
      - component.update: epaper_display
      - logger.log: "Display refreshing, sleeping in 60s..."
      - delay: 60s
      - script.execute: go_to_sleep

# Green button wakes from deep sleep
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

binary_sensor:
  # Right white button = force regeneration
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    name: 'Force Regenerate Button'
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: 'Force regenerate button pressed'
        - script.execute: force_regenerate
  # Left white button = re-fetch image and sleep
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    name: 'Refresh and Sleep Button'
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: 'Refresh button pressed'
        - component.update: frame_image
        # on_download_finished handles display and sleep

script:
  - id: trigger_and_display
    mode: single
    then:
      # POST to generate — server returns 429 if already done today
      - lambda: 'id(generation_accepted) = false;'
      - text_sensor.template.publish:
          id: last_generate_result_sensor
          state: "posting"
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f}", id(battery_level).state);
            return buf;
          on_response:
            - lambda: |-
                if (response->status_code == 200 || response->status_code == 202) {
                  id(generation_accepted) = true;
                  ESP_LOGI("petcast", "Generation accepted (%d)", response->status_code);
                } else {
                  ESP_LOGI("petcast", "Generation skipped or error (%d)", response->status_code);
                }
            - if:
                condition:
                  - lambda: 'return !id(generation_accepted);'
                then:
                  - text_sensor.template.publish:
                      id: last_generate_result_sensor
                      state: "rejected_or_error"
          on_error:
            - lambda: 'id(generation_accepted) = false;'
            - text_sensor.template.publish:
                id: last_generate_result_sensor
                state: "connection_error"
            - logger.log: "HTTP request failed (network/timeout)"
      - if:
          condition:
            - lambda: 'return id(generation_accepted);'
          then:
            - text_sensor.template.publish:
                id: last_generate_result_sensor
                state: "accepted_waiting"
            - logger.log: "Generation started, waiting 2 min..."
            - delay: 120s
            - text_sensor.template.publish:
                id: last_generate_result_sensor
                state: "accepted_done"
          else:
            - logger.log: "Skipping wait, fetching existing image"
      # Fetch and display — on_download_finished handles display refresh and sleep
      # If download fails, watchdog handles sleep (leaves OTA window)
      - text_sensor.template.publish:
          id: last_image_download_sensor
          state: "downloading"
      - logger.log: "Fetching image..."
      - component.update: frame_image

  - id: force_regenerate
    mode: single
    then:
      - lambda: 'id(generation_accepted) = false;'
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f, \"force\": true}", id(battery_level).state);
            return buf;
          on_response:
            - lambda: |-
                if (response->status_code == 200 || response->status_code == 202) {
                  id(generation_accepted) = true;
                  ESP_LOGI("petcast", "Force generation accepted (%d)", response->status_code);
                } else {
                  ESP_LOGW("petcast", "Force generation failed (%d)", response->status_code);
                }
          on_error:
            - logger.log: "Force generate request failed (network/timeout)"
      - if:
          condition:
            - lambda: 'return id(generation_accepted);'
          then:
            - logger.log: 'Force generation triggered, waiting 2 min...'
            - delay: 120s
            - component.update: frame_image
          else:
            - logger.log: 'Force generation failed, fetching existing image'
            - component.update: frame_image

  - id: go_to_sleep
    mode: single
    then:
      - logger.log: 'Going to sleep until 5:00 AM'
      - light.turn_off: onboard_led
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          time_id: ha_time
          until: '05:00:00'

  - id: sleep_watchdog
    mode: single
    then:
      - delay: 600s
      - logger.log: 'Watchdog: 10 min awake, forcing sleep'
      - script.execute: go_to_sleep

  - id: update_battery_status
    mode: single
    then:
      - logger.log: 'Starting battery measurement'
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log:
          format: 'Battery: %.0f%%'
          args: ['id(battery_level).state']

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: 'Onboard LED'
    internal: true
    output: led_output
    id: onboard_led

text_sensor:
  - platform: template
    name: "Last Boot Step"
    id: last_boot_step_sensor
    update_interval: never
  - platform: template
    name: "Last Generate Result"
    id: last_generate_result_sensor
    update_interval: never
  - platform: template
    name: "Last Image Download"
    id: last_image_download_sensor
    update_interval: never
  - platform: template
    name: "Wake Reason"
    id: wake_reason_sensor
    update_interval: never
    lambda: |-
      auto cause = esp_sleep_get_wakeup_cause();
      if (cause == ESP_SLEEP_WAKEUP_TIMER) return std::string("timer");
      if (cause == ESP_SLEEP_WAKEUP_EXT0) return std::string("button");
      if (cause == ESP_SLEEP_WAKEUP_UNDEFINED) return std::string("power_on");
      return std::string("other");

sensor:
  - platform: template
    name: "Boot Count"
    id: boot_count_sensor
    lambda: 'return id(boot_count);'
    update_interval: never
    accuracy_decimals: 0
    icon: "mdi:counter"
  - platform: adc
    pin: GPIO1
    name: 'Battery Voltage'
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: 'Battery Level'
    id: battery_level
    unit_of_measurement: '%'
    icon: 'mdi:battery'
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
