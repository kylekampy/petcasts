# Petcast ESPHome config for Seeed reTerminal E1002
# Display wakes at 4:55 AM, triggers generation, fetches image at 5:00 AM,
# updates the e-ink display, then deep sleeps until next day.
# Green button: regenerate image (if you don't like today's).

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    then:
      - light.turn_on: onboard_led
      - logger.log: "Device booted"
      - script.execute: update_battery_status

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Petcast-Frame Fallback"
    password: !secret ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Chicago"
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    on_time:
      # 4:55 AM — trigger image generation
      - seconds: 0
        minutes: 55
        hours: 4
        then:
          - script.execute: trigger_generation
      # 5:00 AM — fetch and display
      - seconds: 0
        minutes: 0
        hours: 5
        then:
          - component.update: petcast_image
      # 5:02 AM — deep sleep until tomorrow
      - seconds: 0
        minutes: 2
        hours: 5
        then:
          - light.turn_off: onboard_led
          - deep_sleep.enter:
              id: deep_sleep_ctrl
              time_id: sntp_time
              until: "04:55:00"

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      it.image(0, 0, id(petcast_image));

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: petcast_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - component.update: epaper_display

# Green button wakes from deep sleep AND triggers a regeneration loop
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
    name: "Regenerate Button"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Regenerate button pressed"
        - script.execute: trigger_generation
        - delay: 90s
        - component.update: petcast_image

script:
  - id: trigger_generation
    mode: single
    then:
      - http_request.post:
          url: http://mini:7777/api/generate
          on_response:
            - logger.log:
                format: "Generation triggered: %d"
                args: ["status_code"]
  - id: update_battery_status
    mode: single
    then:
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: "Onboard LED"
    internal: true
    output: led_output
    id: onboard_led

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
