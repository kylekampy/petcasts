# Petcast ESPHome config for Seeed reTerminal E1002
#
# Behavior:
#   - Deep sleeps until 4:58 AM daily
#   - Wakes, triggers generation on server, waits, fetches image, displays, sleeps
#   - Green button: wake from sleep, regenerate, display, sleep
#   - Right white button: manual sleep
#   - Safety: auto-sleeps after 5 minutes awake no matter what

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    priority: -100
    then:
      - logger.log: "Boot: starting"
      - light.turn_on: onboard_led
      - script.execute: update_battery_status
      # Start the safety watchdog — if we're still awake in 5 min, force sleep
      - script.execute: sleep_watchdog
      - logger.log: "Boot: waiting for network..."
      - delay: 5s
      # Always trigger a fresh generation and fetch it
      - logger.log: "Boot: triggering generation"
      - script.execute: trigger_generation
      - logger.log: "Boot: waiting for generation (90s)..."
      - delay: 90s
      - logger.log: "Boot: fetching image"
      - component.update: petcast_image
      - logger.log: "Boot: waiting for display refresh..."
      - delay: 30s
      - logger.log: "Boot: done, sleeping"
      - script.execute: go_to_sleep

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "WiFi connected"
  ap:
    ssid: "Petcast-Frame Fallback"
    password: !secret ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Chicago"
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      it.image(0, 0, id(petcast_image));

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: petcast_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - logger.log: "Image downloaded, updating display"
      - component.update: epaper_display

# Green button wakes from deep sleep
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO3
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

# Right white button = manual sleep
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    name: "Sleep Button"
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Sleep button pressed"
        - script.execute: go_to_sleep

script:
  - id: trigger_generation
    mode: single
    then:
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f}", id(battery_level).state);
            return buf;
      - logger.log:
          format: "Generation triggered (battery: %.0f%%)"
          args: ["id(battery_level).state"]

  - id: go_to_sleep
    mode: single
    then:
      - logger.log: "Entering deep sleep until 4:58 AM"
      - light.turn_off: onboard_led
      - delay: 1s
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          time_id: sntp_time
          until: "04:58:00"

  - id: sleep_watchdog
    mode: single
    then:
      # Safety net: if still awake after 5 minutes, force sleep
      # This catches OTA reboots, power cycles, failed boots, etc.
      - delay: 300s
      - logger.log: "Watchdog: still awake after 5 min, forcing sleep"
      - script.execute: go_to_sleep

  - id: update_battery_status
    mode: single
    then:
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log:
          format: "Battery: %.0f%%"
          args: ["id(battery_level).state"]

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: "Onboard LED"
    internal: true
    output: led_output
    id: onboard_led

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
