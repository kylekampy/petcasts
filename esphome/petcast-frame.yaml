# Petcast ESPHome config for Seeed reTerminal E1002
#
# Modeled after the proven forecats config:
# - Device wakes from deep sleep at 5:00 AM (via until timer)
# - on_boot: LED on, battery check
# - on_time 5:02: trigger generation on server
# - on_time 5:04: fetch and display the image
# - on_time 5:06: deep sleep until 5:00 AM tomorrow
#
# Buttons:
#   Green: wake from deep sleep
#   Right white: trigger regeneration (while awake)
#   Left white: toggle test pattern

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    then:
      - light.turn_on: onboard_led
      - logger.log: "Device booted"
      - script.execute: update_battery_status
      - script.execute: sleep_watchdog

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "WiFi connected"
  ap:
    ssid: "Petcast-Frame Fallback"
    password: !secret ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
    timezone: "America/Chicago"
    on_time:
      # 5:02 AM — trigger image generation on server
      - seconds: 0
        minutes: 2
        hours: 5
        then:
          - logger.log: "Scheduled: triggering generation"
          - script.execute: trigger_generation
      # 5:04 AM — fetch and display the image
      - seconds: 0
        minutes: 4
        hours: 5
        then:
          - logger.log: "Scheduled: fetching image"
          - component.update: petcast_image
      # 5:06 AM — go to deep sleep until 5:00 AM tomorrow
      - seconds: 0
        minutes: 6
        hours: 5
        then:
          - logger.log: "Scheduled: entering deep sleep until 5:00 AM"
          - light.turn_off: onboard_led
          - deep_sleep.enter:
              id: deep_sleep_ctrl
              time_id: ha_time
              until: "05:00:00"

globals:
  - id: showing_test_pattern
    type: bool
    restore_value: false
    initial_value: "false"

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      if (id(showing_test_pattern)) {
        it.image(0, 0, id(test_pattern_image));
      } else {
        it.image(0, 0, id(petcast_image));
      }

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: petcast_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - logger.log: "Image downloaded, updating display"
      - component.update: epaper_display
  - id: test_pattern_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/test_pattern.png
    on_download_finished:
      - logger.log: "Test pattern downloaded, updating display"
      - component.update: epaper_display

# Green button wakes from deep sleep
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

binary_sensor:
  # Right white button = regenerate now
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    name: "Manual Update Button"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Manual update button pressed"
        - script.execute: trigger_generation
        - delay: 120s
        - component.update: petcast_image
  # Left white button = sleep until 5:00 AM
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    name: "Sleep Until 5:00am Button"
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Sleep button pressed"
        - delay: 10s
        - light.turn_off: onboard_led
        - deep_sleep.enter:
            id: deep_sleep_ctrl
            time_id: ha_time
            until: "05:00:00"

script:
  - id: trigger_generation
    mode: single
    then:
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f}", id(battery_level).state);
            return buf;
      - logger.log:
          format: "Generation triggered (battery: %.0f%%)"
          args: ["id(battery_level).state"]

  - id: sleep_watchdog
    mode: single
    then:
      - delay: 600s
      - logger.log: "Watchdog: 10 min awake, forcing sleep"
      - light.turn_off: onboard_led
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          time_id: ha_time
          until: "05:00:00"

  - id: toggle_test_pattern
    mode: single
    then:
      - if:
          condition:
            - lambda: 'return id(showing_test_pattern);'
          then:
            - logger.log: "Switching to petcast image"
            - lambda: 'id(showing_test_pattern) = false;'
            - component.update: epaper_display
          else:
            - logger.log: "Switching to test pattern"
            - lambda: 'id(showing_test_pattern) = true;'
            - component.update: test_pattern_image

  - id: update_battery_status
    mode: single
    then:
      - logger.log: "Starting battery measurement"
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log:
          format: "Battery: %.0f%%"
          args: ["id(battery_level).state"]

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: "Onboard LED"
    internal: true
    output: led_output
    id: onboard_led

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
