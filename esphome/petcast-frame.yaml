# Petcast ESPHome config for Seeed reTerminal E1002
#
# Boot-driven flow:
#   1. Wake from deep sleep (timer or green button)
#   2. Wait for HA time sync
#   3. POST /api/generate (server skips if already done today → 429)
#   4. If 202: wait 2 min for generation, then fetch image
#   5. If 429: fetch image immediately (already fresh)
#   6. Display image, deep sleep until 5:00 AM
#
# Buttons:
#   Green: wake from deep sleep (triggers normal boot flow)
#   Right white: force regeneration (bypasses "already today" check)
#   Left white: re-fetch and redraw, then sleep

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    priority: -100
    then:
      - light.turn_on: onboard_led
      - logger.log: 'Device booted'
      - script.execute: update_battery_status
      - script.execute: sleep_watchdog
      # Wait for HA time sync
      - logger.log: 'Waiting for HA time sync...'
      - wait_until:
          condition:
            - time.has_time:
                id: ha_time
          timeout: 60s
      - logger.log:
          format: 'Time synced: %02d:%02d'
          args: ['id(ha_time).now().hour', 'id(ha_time).now().minute']
      # Trigger generation (server returns 429 if already done today)
      - script.execute: trigger_and_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: 'WiFi connected'
  ap:
    ssid: 'Petcast-Frame Fallback'
    password: !secret ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
    timezone: 'America/Chicago'

globals:
  - id: generation_accepted
    type: bool
    restore_value: false
    initial_value: 'false'

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      it.image(0, 0, id(frame_image));

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: frame_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - logger.log: 'Image downloaded, updating display'
      - component.update: epaper_display

# Green button wakes from deep sleep
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

binary_sensor:
  # Right white button = force regeneration
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    name: 'Force Regenerate Button'
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: 'Force regenerate button pressed'
        - script.execute: force_regenerate
  # Left white button = re-fetch image and sleep
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    name: 'Refresh and Sleep Button'
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: 'Refresh button pressed — fetching and sleeping'
        - component.update: frame_image
        - delay: 60s
        - script.execute: go_to_sleep

script:
  - id: trigger_and_display
    mode: single
    then:
      # POST to generate — server returns 429 if already done today
      - lambda: 'id(generation_accepted) = true;'
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f}", id(battery_level).state);
            return buf;
          on_error:
            - lambda: 'id(generation_accepted) = false;'
            - logger.log: 'Server rejected generation (already done today or error)'
      - if:
          condition:
            - lambda: 'return id(generation_accepted);'
          then:
            - logger.log: 'Generation started, waiting 2 min...'
            - delay: 120s
          else:
            - logger.log: 'Skipping wait, fetching existing image'
      # Fetch and display
      - logger.log: 'Fetching image...'
      - component.update: frame_image
      - logger.log: 'Waiting for display refresh...'
      - delay: 60s

  - id: force_regenerate
    mode: single
    then:
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f, \"force\": true}", id(battery_level).state);
            return buf;
      - logger.log: 'Force generation triggered, waiting 2 min...'
      - delay: 120s
      - component.update: frame_image

  - id: go_to_sleep
    mode: single
    then:
      - logger.log: 'Going to sleep until 5:00 AM'
      - light.turn_off: onboard_led
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          time_id: ha_time
          until: '05:00:00'

  - id: sleep_watchdog
    mode: single
    then:
      - delay: 600s
      - logger.log: 'Watchdog: 10 min awake, forcing sleep'
      - script.execute: go_to_sleep

  - id: update_battery_status
    mode: single
    then:
      - logger.log: 'Starting battery measurement'
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log:
          format: 'Battery: %.0f%%'
          args: ['id(battery_level).state']

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: 'Onboard LED'
    internal: true
    output: led_output
    id: onboard_led

sensor:
  - platform: adc
    pin: GPIO1
    name: 'Battery Voltage'
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: 'Battery Level'
    id: battery_level
    unit_of_measurement: '%'
    icon: 'mdi:battery'
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
