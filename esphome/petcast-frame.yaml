# Petcast ESPHome config for Seeed reTerminal E1002
#
# Buttons:
#   Green:       wake from deep sleep (fetch latest image, no regeneration)
#   Right white: trigger regeneration (while awake)
#   Left white:  toggle test pattern / petcast image
#
# Schedule:
#   4:58 AM: deep sleep timer wakes, triggers generation, fetches, displays, sleeps
#
# Safety:
#   Auto-sleeps after 5 minutes awake no matter what

esphome:
  name: petcast-frame
  friendly_name: Petcast Frame
  on_boot:
    priority: -100
    then:
      - logger.log: "Boot: starting"
      - light.turn_on: onboard_led
      - script.execute: update_battery_status
      - script.execute: sleep_watchdog
      - logger.log: "Boot: waiting for network..."
      - delay: 5s
      # Fetch and display the latest image (already generated or from last time)
      - logger.log: "Boot: fetching latest image"
      - component.update: petcast_image
      - logger.log: "Boot: waiting for display refresh..."
      - delay: 30s
      - logger.log: "Boot: complete (watchdog will sleep in ~4 min)"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "WiFi connected"
  ap:
    ssid: "Petcast-Frame Fallback"
    password: !secret ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Chicago"
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    on_time:
      # 4:58 AM — the daily generation cycle
      # (device wakes from deep sleep, boot runs, then this fires)
      - seconds: 0
        minutes: 58
        hours: 4
        then:
          - logger.log: "Scheduled: triggering daily generation"
          - script.execute: trigger_generation

globals:
  - id: showing_test_pattern
    type: bool
    restore_value: false
    initial_value: "false"

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      if (id(showing_test_pattern)) {
        it.image(0, 0, id(test_pattern_image));
      } else {
        it.image(0, 0, id(petcast_image));
      }

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: petcast_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/latest.png
    on_download_finished:
      - logger.log: "Image downloaded, updating display"
      - component.update: epaper_display
  - id: test_pattern_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: http://mini:7777/output/test_pattern.png
    on_download_finished:
      - logger.log: "Test pattern downloaded, updating display"
      - component.update: epaper_display

# Green button wakes from deep sleep
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO3
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

binary_sensor:
  # Right white button = regenerate
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    name: "Regenerate Button"
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Regenerate button pressed"
        - script.execute: trigger_generation
        - delay: 90s
        - component.update: petcast_image
  # Left white button = toggle test pattern
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    name: "Test Pattern Button"
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Test pattern toggle"
        - script.execute: toggle_test_pattern

script:
  - id: trigger_generation
    mode: single
    then:
      - http_request.post:
          url: http://mini:7777/api/generate
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"battery\": %.0f}", id(battery_level).state);
            return buf;
      - logger.log:
          format: "Generation triggered (battery: %.0f%%)"
          args: ["id(battery_level).state"]

  - id: go_to_sleep
    mode: single
    then:
      - wait_until:
          condition:
            - time.has_time:
                id: sntp_time
          timeout: 30s
      - logger.log:
          format: "Sleeping until 4:58 AM (current: %02d:%02d)"
          args: ["id(sntp_time).now().hour", "id(sntp_time).now().minute"]
      - light.turn_off: onboard_led
      - delay: 1s
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          time_id: sntp_time
          until: "04:58:00"

  - id: toggle_test_pattern
    mode: single
    then:
      - if:
          condition:
            - lambda: 'return id(showing_test_pattern);'
          then:
            - logger.log: "Switching to petcast image"
            - lambda: 'id(showing_test_pattern) = false;'
            - component.update: epaper_display
          else:
            - logger.log: "Switching to test pattern"
            - lambda: 'id(showing_test_pattern) = true;'
            - component.update: test_pattern_image

  - id: sleep_watchdog
    mode: single
    then:
      - delay: 300s
      - logger.log: "Watchdog: 5 min awake, sleeping"
      - script.execute: go_to_sleep

  - id: update_battery_status
    mode: single
    then:
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log:
          format: "Battery: %.0f%%"
          args: ["id(battery_level).state"]

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: "Onboard LED"
    internal: true
    output: led_output
    id: onboard_led

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
