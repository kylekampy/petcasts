# Petcast configuration

location:
  name: 'La Crosse'
  latitude: 43.8427
  longitude: -91.1161

styles:
  # Bold, graphic styles that survive 6-color dithering on e-ink
  - 'cubism with geometric shapes, bold black outlines, and flat color blocks'
  - 'flat vector illustration with thick outlines, solid colors, and simplified shapes'
  - 'abstract organic with loose brushstrokes, bold splashes of color, and thick black outlines'
  - 'vintage travel poster with flat graphic shapes and warm muted palette'
  - 'art brut with raw bold lines, high contrast, and limited flat colors'
  - 'mixed media collage with layered paper textures, bold color blocks, and rough edges'
  - 'pop art with bold outlines, halftone dots, and vivid flat colors'
  - 'art deco with geometric symmetry, strong lines, and warm color gradients'
  - 'art poster with minimal flat shapes, muted palette, and clean composition'
  - 'graffiti street art with stencil shapes, spray paint texture, and high contrast'
  - 'jazzy with bold graphic shapes, bright primary colors, and playful composition'
  - 'old cartoons with cel-shaded flat colors, thick outlines, and retro character style'
  - 'Japanese woodblock print with strong black outlines and flat color areas'
  - "children's book illustration with thick outlines and bright flat colors"
  - 'folk art painting with simple shapes and bold patterns'
  - 'linocut print with high contrast black and white plus spot color'

gemini:
  image_model: 'gemini-3.1-flash-image-preview'
  chat_model: 'gemini-2.5-flash'

display:
  width: 800
  height: 480

output:
  latest: 'output/latest.png'
  metadata: 'output/latest.json'
  debug_dir: 'output/debug'
  archive_dir: 'output/archive'

cooldowns:
  photo_days: 7
  combo_days: 14
  style_uses: 7
