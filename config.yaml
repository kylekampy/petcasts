# Petcast configuration

location:
  name: 'La Crosse'
  latitude: 43.8427
  longitude: -91.1161

styles:
  - >-
    Cubist painting in the style of Picasso or Braque. Subjects broken into geometric
    facets and reassembled from multiple viewpoints simultaneously. Flat planes of muted
    color (ochre, slate blue, terracotta, olive) with bold black outlines separating each
    facet. The surface should look like oil paint on canvas with visible brushwork texture.
    NOT a cartoon — this should look like a real cubist painting hanging in a museum.
  - >-
    Abstract organic style like Matisse cut-outs. Loose, energetic brushstrokes in primary
    colors (red, blue, yellow, green, black) on a white or cream background. Thick black
    outlines that look hand-drawn with a marker. Shapes are free-form and imprecise —
    leaves, flowers, and figures are suggested rather than detailed. Joyful, spontaneous,
    and childlike but sophisticated.
  - >-
    1930s-1950s vintage travel poster. Flat areas of color with no gradients, strong
    geometric composition, dramatic perspective. Warm palette of dusty blues, sunset
    oranges, cream, and forest green. Bold sans-serif typography integrated into the
    design. The image should look like a lithograph print — slightly grainy texture,
    visible ink layers, muted rather than bright colors.
  - >-
    Mixed media collage. Layered torn paper, newspaper clippings, and painted surfaces
    overlapping. Visible tape, rough torn edges, mismatched textures. Some areas are
    photographic (halftone dots), others are flat painted color. Bold color blocks of
    orange, blue, black, and white. The surface should look tactile — like you could
    feel the layers of paper. Think Robert Rauschenberg or Kurt Schwitters.
  - >-
    Pop art in the style of Roy Lichtenstein or Andy Warhol. Ben-Day halftone dots visible
    in skin tones and backgrounds. Heavy black outlines. Flat areas of vivid primary colors
    (red, yellow, blue) and pink. High contrast, punchy, commercial look. The image should
    look like it was screen-printed — slightly misregistered ink layers, bold graphic impact.
    NOT subtle — everything is cranked to maximum saturation.
  - >-
    Art deco poster style from the 1920s-1930s. Strong geometric symmetry, radiating
    sunburst patterns, stepped/ziggurat forms. Metallic gold and bronze tones with deep
    navy, black, and cream. Elegant linear details and decorative borders integrated into
    the composition. Streamlined, luxurious, architectural. Looks like a poster for the
    Orient Express or a Jazz Age nightclub.
  - >-
    Minimalist art poster with extremely reduced forms. Subjects depicted as simple flat
    geometric shapes — circles, rectangles, triangles. Very limited muted palette (2-3
    colors plus black and white). Large areas of negative space. No outlines — shapes
    defined by color alone. Clean, quiet, contemplative. Like a Scandinavian design poster
    or a Japanese minimalist print.
  - >-
    Graffiti street art on a concrete or brick wall. Stencil-cut shapes with sharp edges
    and spray paint overspray halos. The wall texture is visible through the paint. Limited
    to 3-4 colors of spray paint (black, white, red, blue). Some drips and runs. Political
    poster aesthetic — think Banksy or Shepard Fairey's OBEY. NOT a cartoon about
    graffiti — the IMAGE ITSELF should look like it IS graffiti on a wall.
  - >-
    Jazzy mid-century modern illustration. Bold graphic shapes in bright primary colors
    (red, blue, yellow, green, black, white). Playful, rhythmic composition with shapes
    that overlap and interlock. Thick black outlines. Characters are simplified and
    expressive — like a 1950s jazz album cover by Jim Flora or Alex Steinweiss. Energetic,
    swinging, musical feeling.
  - >-
    1960s Hanna-Barbera cartoon style. Flat cel-shaded colors with no gradients. Thick
    uniform black outlines. Simple but expressive character designs with exaggerated
    features. Backgrounds are loose watercolor-style washes with minimal detail. Limited
    retro palette — avocado green, burnt orange, mustard yellow, turquoise. Like a frame
    from The Flintstones or Scooby-Doo.
  - >-
    Children's picture book illustration like Eric Carle or Oliver Jeffers. Thick wobbly
    outlines in black. Bright flat colors that look like painted paper or crayon. Textures
    visible in the color fills — tissue paper, stamped paint, crayon wax. Simple, joyful,
    slightly messy. White or cream background showing through. Figures are round and
    friendly with big eyes.
  - >-
    Eastern European folk art painting. Stylized flowers, birds, and decorative motifs
    filling every surface. Bold symmetrical patterns. Bright primary colors on a dark or
    white background. Subjects are flat and decorative rather than realistic — like
    painted wooden toys or Ukrainian pysanky eggs. Every surface is patterned. Looks
    hand-painted on wood.
  - >-
    Retro pixel art like a 16-bit video game. Chunky visible pixels, no anti-aliasing,
    no smooth edges. Limited palette of 6-8 colors maximum. Characters are built from
    large blocky pixel clusters — not detailed, not smooth. Black pixel outlines around
    every shape. The entire image should look like a screenshot from a Super Nintendo or
    Sega Genesis game — you should be able to count individual pixels. Backgrounds are
    simple tiled patterns. Text should be in a blocky pixel font.

