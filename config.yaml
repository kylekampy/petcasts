# Petcast configuration

location:
  name: 'La Crosse'
  latitude: 43.8427
  longitude: -91.1161

styles:
  # Bold lines, flat colors, high contrast — styles that survive
  # 6-color dithering on an 800x480 e-ink display
  - 'comic book pop art with bold outlines and flat colors'
  - 'Japanese woodblock print with strong black outlines'
  - 'retro pixel art with chunky pixels and limited palette'
  - 'paper cut-out collage with bold shapes and solid colors'
  - 'linocut print with high contrast black and white plus spot color'
  - 'vintage travel poster with flat graphic shapes'
  - "children's book illustration with thick outlines and bright flat colors"
  - 'stained glass window style with black leading and vivid color blocks'
  - 'folk art painting with simple shapes and bold patterns'
  - 'screen print with limited flat color layers'

openai:
  model: 'gpt-image-1.5'
  chat_model: 'gpt-4.1'
  size: '1536x1024'

display:
  width: 800
  height: 480

output:
  latest: 'output/latest.png'
  metadata: 'output/latest.json'
  debug_dir: 'output/debug'
  archive_dir: 'output/archive'

cooldowns:
  photo_days: 7
  combo_days: 14
  style_uses: 7
