services:
  petcast:
    image: ghcr.io/kylekampy/petcasts:latest
    container_name: petcast
    ports:
      - "7777:7777"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - /opt/volumes/petcast/state:/app/pets/state
      - /opt/volumes/petcast/output:/app/output
      # Flat per-day outputs for sharing (raw + dithered + metadata, named by date).
      # Point Google Photos / Drive / any sync tool at this host path.
      - /opt/volumes/petcast/daily:/app/output/daily
    restart: unless-stopped
