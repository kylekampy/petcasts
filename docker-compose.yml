services:
  petcast:
    build: .
    container_name: petcast
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./pets/input:/app/pets/input:ro
      - ./pets/meta:/app/pets/meta:ro
      - ./pets/state:/app/pets/state
      - ./output:/app/output
    restart: unless-stopped
