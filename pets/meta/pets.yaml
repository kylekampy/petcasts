# Pet descriptions for scene generation
# Add your pets here. Each pet needs:
#   - name: display name
#   - description: physical appearance for AI image generation
#   - photos: list of filenames in pets/input/
#
# Groups define which pets lived together and can appear in the same image.

groups:
  - name: 'the OGs'
    pets: [Zeya, Patrick, Pixel, Kona]
  - name: 'the recent pack'
    pets: [Margot, Zeya, Pebble, Mumford, Fennec]
  - name: 'the recent dogs'
    pets: [Margot, Zeya, Pebble]
  - name: 'the current pack'
    pets: [Margot, Pebble, Mumford, Fennec]
  - name: 'the cats'
    pets: [Mumford, Fennec]

pets:
  - name: 'Margot'
    description: >-
      A vizsla. Rust/copper-red short coat, slim and athletic build, long floppy ears,
      deep amber eyes. Wears a light blue/teal collar. Tall and leggy. Super energetic
      and outgoing — a velcro dog who always has to be near her people. Loves frisbee.
      Teases and picks on Zeya. Best friends with Pebble, always wrestling together.
      Loves cuddling with cats. Female.
    photos:
      - 'margot_zeya_pebble_posing.png'
      - 'pebble_zeya_margot_on_dog_bed.png'
      - 'margot_zeya_in_dog_bed.png'
      - 'pebble_margot_sitting.png'
      - 'margot_pebble_zeya_on_deck.png'
      - 'zeya_mumford_pebble_fennec_margot_couch_pile.png'
      - 'margot_zeya_pebble_with_owners.png'
  - name: 'Zeya'
    description: >-
      A boston terrier. Classic black and white tuxedo markings with slight brindle, white blaze on face,
      erect bat ears. One-eyed (missing her left eye). Has NO tail, just a tiny nub/curl.
      Small and compact, much smaller than the other dogs.
      High energy and sassy — obsessed with fetch. More people-oriented than
      dog-oriented. Was an only dog for a long time before the others came along.
      Gets teased by Margot. Loves cuddling with cats. Female.
    photos:
      - 'margot_zeya_pebble_posing.png'
      - 'pebble_zeya_margot_on_dog_bed.png'
      - 'mumford_kitten_zeya_on_couch.png'
      - 'mumford_kitten_zeya_snuggling.png'
      - 'margot_zeya_in_dog_bed.png'
      - 'margot_pebble_zeya_on_deck.png'
      - 'zeya_mumford_pebble_fennec_margot_couch_pile.png'
      - 'margot_zeya_pebble_with_owners.png'
      - 'zeya_patrick_pixel_kona_on_red_blanket.png'
  - name: 'Pebble'
    description: >-
      A pitbull boxer mix. ONE head. Stocky, muscular, barrel-chested build. Uniform
      tan/fawn coat everywhere — face, head, body, legs are ALL the same tan/fawn color.
      Dark nose. NO white on face. The ONLY white is a small blaze on her chest.
      Broad blocky head, floppy rose ears, wrinkly forehead. Wears a patterned collar.
      Bigger/wider than Margot. The laziest of the
      dogs — a huge scaredy-cat but incredibly sweet. Prefers cuddling in a cozy corner
      to any kind of exercise. Best friends with Margot, loves wrestling with her.
      Loves all dogs. Gentle with cats. Female.
    photos:
      - 'margot_zeya_pebble_posing.png'
      - 'pebble_zeya_margot_on_dog_bed.png'
      - 'pebble_mumford_kitten_cuddling.png'
      - 'pebble_margot_sitting.png'
      - 'pebble_mumford_on_couch.png'
      - 'margot_pebble_zeya_on_deck.png'
      - 'zeya_mumford_pebble_fennec_margot_couch_pile.png'
      - 'pebble_fennec_cuddling.png'
      - 'margot_zeya_pebble_with_owners.png'
  - name: 'Mumford'
    description: >-
      A domestic shorthair cat. Warm buff/cream coat with faint tabby striping, more
      solid buff than striped. Round face, golden-green eyes, pink nose. Full-grown,
      medium build. Snuggly and affectionate — loves attention from his owners.
      Mostly lazy, but also loves to fetch his bird and mouse toys.
      Best friends with Fennec, always found together. Loves cuddling
      with the dogs too. Male.
    photos:
      - 'pebble_mumford_kitten_cuddling.png'
      - 'mumford_kitten_zeya_on_couch.png'
      - 'mumford_kitten_zeya_snuggling.png'
      - 'pebble_mumford_on_couch.png'
      - 'fennec_mumford_on_bed.png'
      - 'zeya_mumford_pebble_fennec_margot_couch_pile.png'
      - 'mumford_fennec_sleeping.png'
      - 'fennec_mumford_in_cat_bed.png'
  - name: 'Fennec'
    description: >-
      A sphynx cat. Completely hairless/naked with wrinkly gray-brown skin, huge
      pointed ears, large round eyes, angular face. Lean and bony. A heat thief —
      constantly curling up on other pets or burrowing under blankets to steal warmth.
      Sometimes wears a sweater. Obsessed with food. Either hiding under a blanket,
      begging for food, or tearing around with the zoomies. Best friends with Mumford. Male.
    photos:
      - 'fennec_mumford_on_bed.png'
      - 'zeya_mumford_pebble_fennec_margot_couch_pile.png'
      - 'pebble_fennec_cuddling.png'
      - 'mumford_fennec_sleeping.png'
      - 'fennec_mumford_in_cat_bed.png'
  - name: 'Patrick'
    description: >-
      A gray tabby domestic shorthair cat. Silver-gray coat with darker gray stripes,
      green eyes, medium build. Chunky and round when loafing. Super friendly boy.
      From Kyle and Amanda's earlier years — no longer with us but forever loved. Male.
    photos:
      - 'zeya_patrick_pixel_kona_on_red_blanket.png'
      - 'patrick_pixel_on_couch.png'
  - name: 'Pixel'
    description: >-
      A domestic shorthair cat with tuxedo pattern — mostly dark gray/black on top
      with white chest, belly, and paws. Black ears with white between them.
      Yellow-green eyes. Compact and round. A bit odd but very lovely.
      Always wherever Patrick is. From an earlier time — no longer with us. Female.
    photos:
      - 'zeya_patrick_pixel_kona_on_red_blanket.png'
      - 'patrick_pixel_on_couch.png'
  - name: 'Kona'
    description: >-
      A domestic shorthair cat. Solid black coat, sleek and shiny. Yellow/gold eyes,
      wears a collar with a round yellow tag. Medium build. Super cuddly with people.
      Always with Patrick and Pixel. From an earlier time — no longer with us. Female.
    photos:
      - 'zeya_patrick_pixel_kona_on_red_blanket.png'
